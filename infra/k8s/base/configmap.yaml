apiVersion: v1
kind: ConfigMap
metadata:
  name: freecrm-config
data:
  NODE_ENV: "production"
  DATABASE_HOST: "postgres-service"
  DATABASE_PORT: "5432"
  DATABASE_NAME: "freecrm"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  KEYCLOAK_URL: "http://keycloak-service:8080"
  KEYCLOAK_REALM: "freecrm"
  MINIO_ENDPOINT: "minio-service"
  MINIO_PORT: "9000"
  NEXT_PUBLIC_API_URL: "/api/v1"
