apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: freecrm-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: crm.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: freecrm-api
                port:
                  number: 3001
          - path: /
            pathType: Prefix
            backend:
              service:
                name: freecrm-web
                port:
                  number: 3000
  tls:
    - hosts:
        - crm.example.com
      secretName: freecrm-tls
