# Arquivo de Workflow do GitHub Actions para análise de qualidade de código com CodeQL

name: Code Quality Analysis

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '30 2 * * 1' # Roda toda Segunda às 02:30 UTC

jobs:
  analyze:
    name: Analyze Code
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        # O repositório é TypeScript/JavaScript
        language: [ 'javascript' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # Inicializa o CodeQL. O GitHub hospeda o CodeQL e não cobra por seu uso em repositórios públicos.
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
        # Configurações de análise podem ser adicionadas aqui
        # queries: +security-and-quality

    # O autobuild tenta detectar e compilar o projeto automaticamente.
    - name: Autobuild
      uses: github/codeql-action/autobuild@v3

    # Executa a análise do CodeQL e envia os resultados para o GitHub.
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:${{matrix.language}}"
